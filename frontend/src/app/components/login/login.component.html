<div class="card">
  <h2 class="text-center">Iniciar Sesión</h2>
  
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-3">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" class="form-control" 
             [ngClass]="{'is-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}">
      <span class="text-danger" *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">El email es requerido.</span>
      <span class="text-danger" *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">Formato de email inválido.</span>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" formControlName="password" class="form-control"
             [ngClass]="{'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}">
      <span class="text-danger" *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched">La contraseña es requerida.</span>
      <span class="text-danger" *ngIf="loginForm.get('password')?.errors?.['minlength'] && loginForm.get('password')?.touched">Mínimo 6 caracteres.</span>
    </div>

    <div *ngIf="errorMessage" class="text-danger text-center form-group">
      {{ errorMessage }}
    </div>

    <button type="submit" class="btn" [disabled]="loginForm.invalid">Entrar</button>
  </form>

  <p class="text-center mt-3">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
  <p class="text-center mt-3"><a routerLink="/">Volver al inicio</a></p>
</div>
