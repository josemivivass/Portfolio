<section class="skills-section">
  <div class="container skills-grid">
    <div class="skills-text">
      <h2>Stack Tecnológico</h2>
      <div class="line"></div>
      <p>Dominio en el desarrollo de aplicaciones web de extremo a extremo, enfocándome en el rendimiento, la escalabilidad y las animaciones interactivas.</p>
      
      <ul class="skills-list">
        <li *ngFor="let skill of skillsList">
          <span class="skill-name">{{ skill.name }}</span>
          <span class="skill-level">{{ skill.level }}</span>
        </li>
      </ul>
    </div>
    
    <div class="skills-animation">
      <canvas #riveCanvas class="rive-canvas"></canvas>
      <p class="rive-fallback">Animación Rive interactiva</p>
    </div>
  </div>
</section>
