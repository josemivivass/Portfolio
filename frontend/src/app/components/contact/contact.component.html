<div class="contact-container">
  <header class="contact-header">
    <h1>Contacto</h1>
    <p class="subtitle">¿Tienes un proyecto en mente? Hablemos.</p>
  </header>

  <div class="contact-info-bar">
    <a href="mailto:jose.miguel.vivas.sanchez@gmail.com" class="contact-info-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>
      <span>jose.miguel.vivas.sanchez&#64;gmail.com</span>
    </a>
    <a href="tel:+34645316309" class="contact-info-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span>+34 645 31 63 09</span>
    </a>
    <a href="https://linkedin.com/in/josemiguelvivassanchez/" target="_blank" class="contact-info-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      <span>LinkedIn</span>
    </a>
    <div class="contact-info-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>Cáceres, España</span>
    </div>
  </div>

  <div class="card contact-card">
    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input type="text" id="name" formControlName="name" class="form-control"
               [ngClass]="{'is-invalid': contactForm.get('name')?.invalid && contactForm.get('name')?.touched}">
        <span class="text-danger" *ngIf="contactForm.get('name')?.errors?.['required'] && contactForm.get('name')?.touched">El nombre es requerido.</span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" class="form-control"
               [ngClass]="{'is-invalid': contactForm.get('email')?.invalid && contactForm.get('email')?.touched}">
        <span class="text-danger" *ngIf="contactForm.get('email')?.errors?.['required'] && contactForm.get('email')?.touched">El email es requerido.</span>
        <span class="text-danger" *ngIf="contactForm.get('email')?.errors?.['email'] && contactForm.get('email')?.touched">Formato de email inválido.</span>
      </div>

      <div class="form-group">
        <label for="message">Mensaje</label>
        <textarea id="message" formControlName="message" class="form-control" rows="5"
                  [ngClass]="{'is-invalid': contactForm.get('message')?.invalid && contactForm.get('message')?.touched}"></textarea>
        <span class="text-danger" *ngIf="contactForm.get('message')?.errors?.['required'] && contactForm.get('message')?.touched">El mensaje es requerido.</span>
        <span class="text-danger" *ngIf="contactForm.get('message')?.errors?.['minlength'] && contactForm.get('message')?.touched">Mínimo 10 caracteres.</span>
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <button type="submit" class="btn btn-primary mt-3" [disabled]="contactForm.invalid">Enviar Mensaje</button>
    </form>
  </div>
</div>
