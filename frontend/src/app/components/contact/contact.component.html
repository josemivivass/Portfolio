<div class="auth-container">
  <div class="auth-card">
    <header class="auth-header">
      <h2>{{ i18n.t('contact.title') }}</h2>
      <p>{{ i18n.t('contact.subtitle') }}</p>
    </header>

    <form class="auth-form" (submit)="sendMessage($event)">
      <div class="form-group">
        <label>{{ i18n.t('contact.name') }}</label>
        <input type="text" name="name" [(ngModel)]="formData.name" maxlength="100" [placeholder]="i18n.t('contact.name')" required>
      </div>
      
      <div class="form-group">
        <label>{{ i18n.t('contact.email') }}</label>
        <input type="email" name="email" [(ngModel)]="formData.email" [placeholder]="i18n.t('contact.email')" required>
      </div>
      
      <div class="form-group">
        <label>{{ i18n.t('contact.message') }}</label>
        <textarea rows="4" name="message" [(ngModel)]="formData.message" minlength="20" [placeholder]="i18n.t('contact.message')" required></textarea>
      </div>
      
      <div class="recaptcha-wrapper">
        <div #recaptcha class="g-recaptcha" [attr.data-sitekey]="siteKey"></div>
      </div>

      <div *ngIf="successMsg" class="alert-success">{{ successMsg }}</div>
      <div *ngIf="errorMsg" class="alert-error">{{ errorMsg }}</div>

      <button type="submit" class="btn-submit" [disabled]="isSubmitting || isSent" [class.success-state]="isSent">
        <span *ngIf="!isSubmitting && !isSent">{{ i18n.t('contact.send') }}</span>
        <span *ngIf="isSubmitting">{{ i18n.t('contact.send') }}...</span>
        <span *ngIf="isSent">✓ {{ i18n.lang === 'en' ? 'Sent!' : '¡Enviado!' }}</span>
      </button>
    </form>

    <div class="auth-divider">
      <span>{{ i18n.t('contact.divider') }}</span>
    </div>

    <div class="contact-social-links">
      <a href="mailto:jose.miguel.vivas.sanchez@gmail.com" class="social-link-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>
        {{ i18n.t('hero.email') }}
      </a>
      <a href="https://linkedin.com/in/josemiguelvivassanchez/" target="_blank" class="social-link-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        LinkedIn
