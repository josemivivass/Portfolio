<section class="projects-section">
  <div class="container">
    <header class="section-header">
      <h2>Proyectos Destacados</h2>
      <div class="line"></div>
    </header>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <div class="projects-list" *ngIf="projects.length > 0; else noProjects">
      <article #projectCard class="project-card-horizontal" *ngFor="let project of projects">
        <div class="project-image" [ngStyle]="{'background-image': 'url(' + (project.image_url || 'https://placehold.co/800x600/EEE/31343C') + ')'}">
        </div>
        <div class="project-content">
          <h3>{{ project.title }}</h3>
          <p class="date">{{ project.project_date | date:'longDate' }}</p>
          <p class="description">{{ project.description }}</p>
          
          <div class="tags">
            <span class="tag" *ngFor="let tag of project.tags.split(',')">{{ tag.trim() }}</span>
          </div>
          
          <div class="project-links">
            <a *ngIf="project.repo_url" [href]="project.repo_url" target="_blank" class="btn-outline">Código</a>
            <a *ngIf="project.live_url" [href]="project.live_url" target="_blank" class="btn-primary">Demo</a>
          </div>
        </div>
      </article>
    </div>

    <ng-template #noProjects>
      <p class="no-projects" *ngIf="!errorMessage">No hay proyectos disponibles en este momento.</p>
    </ng-template>
  </div>
</section>
