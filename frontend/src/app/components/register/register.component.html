<div class="card">
  <h2 class="text-center">Crear Cuenta</h2>
  
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="mt-3">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" class="form-control"
             [ngClass]="{'is-invalid': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}">
      <span class="text-danger" *ngIf="registerForm.get('email')?.errors?.['required'] && registerForm.get('email')?.touched">El email es requerido.</span>
      <span class="text-danger" *ngIf="registerForm.get('email')?.errors?.['email'] && registerForm.get('email')?.touched">Formato inválido.</span>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" formControlName="password" class="form-control"
             [ngClass]="{'is-invalid': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}">
      <span class="text-danger" *ngIf="registerForm.get('password')?.errors?.['required'] && registerForm.get('password')?.touched">La contraseña es requerida.</span>
      <span class="text-danger" *ngIf="registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched">Mínimo 6 caracteres.</span>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmar Contraseña</label>
      <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control"
             [ngClass]="{'is-invalid': (registerForm.get('confirmPassword')?.invalid || registerForm.hasError('mismatch')) && registerForm.get('confirmPassword')?.touched}">
      <span class="text-danger" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">Las contraseñas no coinciden.</span>
    </div>

    <div *ngIf="errorMessage" class="text-danger text-center form-group">
      {{ errorMessage }}
    </div>

    <button type="submit" class="btn" [disabled]="registerForm.invalid">Registrarse</button>
  </form>

  <p class="text-center mt-3">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  <p class="text-center mt-3"><a routerLink="/">Volver al inicio</a></p>
</div>
