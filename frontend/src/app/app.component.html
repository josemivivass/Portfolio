<div *ngIf="isHomeRoute && showPreloader"
     class="preloader-overlay">
</div>

<div class="global-geometric-background" *ngIf="isHomeRoute">
  <app-hero3d></app-hero3d>
</div>

<div *ngIf="isHomeRoute && showIntro"
     class="intro-fullscreen-overlay"
     [style.transform]="'translateY(' + introTranslateY + 'vh)'"
     [style.opacity]="introOpacity">

  <div class="intro-scaling-box"
       [style.transform]="'scale(' + introScale + ')'"
       [style.pointer-events]="disableReveal ? 'none' : 'auto'">

    <div class="dark-tint" [style.opacity]="overlayOpacity"></div>
    <app-reveal-complex [disableInteraction]="disableReveal"></app-reveal-complex>
  </div>
</div>

<div *ngIf="isHomeRoute && showIntro" class="scroll-forced-spacer"></div>

<div class="main-app-container"
     [class.is-intro-active]="showIntro"
     [style.transform]="showIntro ? 'translateY(' + mainTranslateY + 'vh)' : 'none'">

  <nav class="side-menu left-menu"
       [style.transform]="isHomeRoute ? 'translateY(calc(-50% + ' + menuTranslateY + 'px))' : 'translateY(-50%)'">
    <span class="menu-label">{{ i18n.t('nav.pages') }}</span>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">{{ i18n.t('nav.cv') }}</a>
    <a routerLink="/proyectos" routerLinkActive="active" class="nav-link">{{ i18n.t('nav.projects') }}</a>
    <a routerLink="/contacto" routerLinkActive="active" class="nav-link">{{ i18n.t('nav.contact') }}</a>
  </nav>

  <nav class="side-menu right-menu"
       [style.transform]="isHomeRoute ? 'translateY(calc(-50% + ' + menuTranslateY + 'px))' : 'translateY(-50%)'">
    <span class="menu-label">{{ i18n.t('nav.account') }}</span>
    <ng-container *ngIf="isLoggedIn; else loggedOut">
      <span class="user-status">{{ i18n.t('nav.connected') }}</span>
      <button class="nav-link btn-logout" (click)="logout()">{{ i18n.t('nav.logout') }}</button>
    </ng-container>
    <ng-template #loggedOut>
      <a routerLink="/login" class="nav-link">{{ i18n.t('nav.login') }}</a>
      <a routerLink="/register" class="nav-link highlight">{{ i18n.t('nav.register') }}</a>
    </ng-template>
    <button class="lang-toggle" (click)="i18n.toggle()" [attr.aria-label]="'Switch to ' + i18n.t('nav.lang')">
      {{ i18n.t('nav.lang') }}
    </button>
  </nav>

  <main class="main-content" [class.secondary-route]="!isHomeRoute">
    <app-home *ngIf="isHomeRoute"></app-home>
    <router-outlet *ngIf="!isHomeRoute"></router-outlet>
  </main>

</div>
